name: Deploy Dev to EC2

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate index.html exists
        run: test -f index.html

      - name: Upload static files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 98.84.6.90
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "index.html,styles.css,assets"
          target: /var/www/drinkbuuz-dev
          overwrite: true

      - name: Fix permissions
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 98.84.6.90
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo chown -R nginx:nginx /var/www/drinkbuuz-dev
            echo "Deploy complete"

      - name: Health check
        run: |
          sleep 5
          curl --fail --silent --max-time 20 http://dev.drinkbuuz.com/ > /dev/null && echo "Site is up"
