name: Deploy Dev to EC2

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate index.html exists
        run: test -f index.html

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 98.84.6.90
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            sudo mkdir -p /var/www/drinkbuuz-dev
            sudo chown ec2-user:ec2-user /var/www/drinkbuuz-dev

            # Clone or pull dev branch
            if [ ! -d /var/www/drinkbuuz-dev/.git ]; then
              git clone --branch dev --single-branch https://github.com/nadavrajuan/drinkbuuz-landing.git /var/www/drinkbuuz-dev
            else
              cd /var/www/drinkbuuz-dev
              git fetch origin dev
              git reset --hard origin/dev
            fi

            echo "Static files deployed to /var/www/drinkbuuz-dev"

      - name: Health check
        run: |
          sleep 5
          curl --fail --silent --max-time 20 http://dev.drinkbuuz.com/ > /dev/null && echo "Site is up"
